name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke-test the CLI (all output formats)
        run: |
          python -m aisgapwatch examples/sample_track.csv --json --top 1 || true
          python -m aisgapwatch examples/sample_track.csv --format geojson --top 1 || true
          python -m aisgapwatch examples/sample_track.csv --format stix --top 1 || true
          python -m aisgapwatch examples/sample_track.csv --format ndjson || true
          python -m aisgapwatch examples/sample_track.csv --format csv || true
          python -m aisgapwatch examples/sample_track.csv --context --stats || true
          python -m aisgapwatch --version
